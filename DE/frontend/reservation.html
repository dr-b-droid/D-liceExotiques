<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Délices Exotiques - Restaurant Gastronomique</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="shortcut icon" href="/assets/imgs/logo.png" type="image/x-icon">
    <script src="/components/tailwindcss.js"></script>
    <script src="/components/navigation.js"></script>
    <script src="/components/footer.js"></script>
    <script src="/components/feather.min.js"></script>
<script src="/js/api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        deepblack: '#0A0A0A',
                        emerald: '#50C878',
                        africanred: '#E32636',
                        richbrown: '#5C4033',
                    }
                }
            }
        }
    </script>

</head>
<body class="bg-deepblack text-white font-sans overflow-x-hidden">
    <!-- Main Navigation -->
    <custom-navigation></custom-navigation>
    
    <!-- Hero Section -->
    <section class="relative h-screen overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/50 to-deepblack z-10"></div>
        <div class="absolute inset-0">
            <img src="/assets/imgs/img_acceuil.png" alt="Restaurant" class="w-full h-full object-cover scale-110 animate-slow-zoom">
        </div>
        
        <div class="relative z-20 h-full flex flex-col justify-center items-center text-center px-4">
            <h1 class="text-5xl md:text-7xl lg:text-8xl font-serif mb-6 text-gold animate-fade-in">
                <span class="block">Délices</span>
                <span class="block">Exotiques</span>
            </h1>
            <p class="text-xl md:text-2xl lg:text-3xl max-w-3xl mb-10 text-white/90 animate-fade-in-delay">
                Une symphonie de saveurs revisitées avec élégance
            </p>
            <div class="flex flex-col md:flex-row gap-4 animate-bounce-in">
                <a href="#reservation" class="px-10 py-4 bg-gold hover:bg-gold/90 text-deepblack font-medium rounded-full transition-all transform hover:scale-105 shadow-2xl">
                    Réserver une table
                </a>
                <a href="/menu" class="px-10 py-4 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 text-white font-medium rounded-full transition-all transform hover:scale-105">
                    Voir le menu
                </a>
            </div>
        </div>
    </section>

    <!-- Reservation Section -->
    <section class="py-20 bg-gradient-to-b from-deepblack to-richbrown/20" id="reservation">
        <div class="max-w-4xl mx-auto px-4 md:px-8">
            <div class="bg-gradient-to-br from-richbrown/40 to-richbrown/20 border border-gold/30 rounded-2xl p-8 md:p-12 backdrop-blur-sm shadow-2xl fade-in-section">
                <div class="text-center mb-10">
                    <h2 class="text-4xl md:text-5xl font-serif mb-4 text-gold">Réserver une Table</h2>
                    <p class="text-white/70 text-lg">Réservez dès maintenant votre expérience gastronomique</p>
                </div>
                
                <!-- Contenu dynamique selon l'état de connexion -->
                <div id="reservationContent">
                    <!-- Sera rempli dynamiquement par JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Component -->
    <custom-footer></custom-footer>
    <script src="/js/reservation-script.js"></script>
    <script src="/components/utils.js"></script>
</body>
</html>
