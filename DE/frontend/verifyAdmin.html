<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Admin  </title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="shortcut icon" href="/assets/imgs/logo.png" type="image/x-icon">
    <script src="/components/tailwindcss.js"></script>
    <script src="/components/feather.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        deepblack: '#0A0A0A',
                        emerald: '#50C878',
                        africanred: '#E32636',
                        richbrown: '#5C4033',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background: linear-gradient(135deg, #0A0A0A 0%, #1a1410 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-gold/20 to-gold/5 rounded-full mb-6">
                <i data-feather="shield" class="text-gold" width="40" height="40"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-serif text-gold mb-3">Délices Exotiques</h1>
            <p class="text-xl text-white/60">Accès Administrateur</p>
        </div>

        <!-- Card principale -->
        <div class="bg-gradient-to-br from-richbrown/40 to-richbrown/20 border border-gold/30 rounded-3xl p-8 md:p-12 backdrop-blur-sm">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-medium text-white mb-2">Vérification requise</h2>
                <p class="text-white/60">Veuillez entrer le code d'accès administrateur</p>
            </div>

            <form id="verificationForm" class="space-y-6">
                <!-- Input du code -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none">
                        <i data-feather="lock" class="text-gold/50" width="24" height="24" id="lock"></i>
                    </div>
                    <input 
                        type="password" 
                        id="adminCode" 
                        placeholder="Entrez le code admin"
                        class="input-glow w-full bg-deepblack/50 border-2 border-gold/20 rounded-2xl pl-16 pr-6 py-6 text-white text-xl md:text-2xl font-medium tracking-widest focus:border-gold focus:outline-none transition-all duration-300 text-center"
                        autocomplete="off"
                        maxlength="20"
                    >
                </div>

                <!-- Message d'erreur/succès -->
                <div id="statusMessage" class="hidden"></div>

                <!-- Bouton de validation -->
                <button 
                    type="submit"
                    id="submitBtn"
                    class="w-full bg-gradient-to-r from-gold to-gold/80 hover:from-gold/90 hover:to-gold/70 text-deepblack font-bold py-5 rounded-2xl transition-all duration-300 flex items-center justify-center gap-3 text-lg shadow-lg shadow-gold/20 hover:shadow-gold/40"
                >
                    <span>Accéder au Dashboard</span>
                    <i data-feather="arrow-right" width="24" height="24"></i>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-8 pt-6 border-t border-gold/10 text-center">
                <p class="text-white/40 text-sm mb-3">Vous n'êtes pas administrateur ?</p>
                <a href="/" class="inline-flex items-center gap-2 text-gold hover:text-gold/80 transition-colors text-sm">
                    <i data-feather="home" width="16" height="16"></i>
                    <span>Retour à l'accueil</span>
                </a>
            </div>
        </div>

        <!-- Info sécurité -->
        <div class="mt-6 text-center">
            <p class="text-white/30 text-xs flex items-center justify-center gap-2">
                <i data-feather="shield-off" width="14" height="14"></i>
                <span>Accès sécurisé et protégé</span>
            </p>
        </div>
    </div>
    <script src="/js/verifyAdmin-script.js"></script>
    <script src="/components/utils.js"></script>
</body>
</html>
